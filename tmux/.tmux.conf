set -g mouse on
set -g history-limit 100000

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

setw -g mode-keys vi
set -g set-clipboard on

bind & if-shell -F "#{==:#{window_index},1}" \
  "kill-window" \
  "select-window -t :- ; kill-window -t :+"
bind x kill-pane
bind X confirm-before -p "kill session #S? (y/n)" kill-session

bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -a -c "#{pane_current_path}"
bind C command-prompt -p "new session name:" "new-session -s '%%' -c '~'"

bind n previous-window
bind p next-window

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-no-clear 'pbcopy 2>/dev/null || xclip -selection clipboard -in'
bind -T copy-mode-vi Enter send -X copy-pipe-no-clear 'pbcopy 2>/dev/null || xclip -selection clipboard -in'
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-no-clear 'pbcopy 2>/dev/null || xclip -selection clipboard -in'

# Capture current pane's scrollback into a new window with line numbers.
#   prefix P → less -N    (quick read, q to exit)
#   prefix N → nvim       (full navigation: /, n, marks, etc.)
bind P run-shell 'tmux capture-pane -p -S - > /tmp/tmux-pane && tmux new-window "less -N +G /tmp/tmux-pane"'
bind N run-shell 'tmux capture-pane -p -S - > /tmp/tmux-pane && tmux new-window "nvim -c \"set number nowrap\" -c \"normal G\" /tmp/tmux-pane"'

# theme=light
set -g status-style "bg=default,fg=#555555"
set -g window-status-style "bg=default,fg=#777777"
set -g window-status-current-style "bg=default,fg=#000000,bold"
set -g status-left-style "bg=default,fg=#555555"
set -g status-right-style "bg=default,fg=#555555"
set -g message-style "bg=default,fg=#333333"
set -g pane-border-style "fg=#cccccc"
set -g pane-active-border-style "fg=#888888"

# --- plugins (TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'

run '~/.tmux/plugins/tpm/tpm'
